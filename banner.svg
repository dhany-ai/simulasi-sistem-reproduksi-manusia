<svg viewBox="0 0 1280 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="bannerTitle bannerDesc">
<title id="bannerTitle">Atlas Reproduksi — Simulasi Interaktif Sistem Reproduksi Manusia</title>
<desc id="bannerDesc">Banner proyek dengan diagram roda siklus menstruasi 28 hari dan ringkasan fitur</desc>
<defs>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0A0F16"/>
    <stop offset="100%" stop-color="#121B27"/>
  </linearGradient>
  <pattern id="dotGrid" width="26" height="26" patternUnits="userSpaceOnUse">
    <circle cx="1.2" cy="1.2" r="1.2" fill="#5FE3D0" opacity="0.16"/>
  </pattern>
  <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#5FE3D0" stop-opacity="0.30"/>
    <stop offset="100%" stop-color="#5FE3D0" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glowRose" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#DA6483" stop-opacity="0.22"/>
    <stop offset="100%" stop-color="#DA6483" stop-opacity="0"/>
  </radialGradient>
  <filter id="blurSoft" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="28"/>
  </filter>
  <style>
    .mono { font-family: 'IBM Plex Mono','Courier New',monospace; }
    .disp { font-family: 'Space Grotesk','Arial Narrow',Arial,sans-serif; font-weight: 700; }
    .body { font-family: 'IBM Plex Sans','Segoe UI',Arial,sans-serif; }
  </style>
</defs>

<rect width="1280" height="360" fill="url(#bgGrad)"/>
<rect width="1280" height="360" fill="url(#dotGrid)"/>
<rect x="1" y="1" width="1278" height="358" fill="none" stroke="#232E3A" stroke-width="1.5"/>

<circle cx="985" cy="160" r="150" fill="url(#glowCyan)" filter="url(#blurSoft)"/>
<circle cx="1085" cy="255" r="120" fill="url(#glowRose)" filter="url(#blurSoft)"/>

<!-- eyebrow -->
<line x1="64" y1="60" x2="86" y2="60" stroke="#5FE3D0" stroke-width="1.5"/>
<text x="96" y="65" class="mono" font-size="14" letter-spacing="2.6" fill="#5FE3D0">SIMULASI_BIOLOGI // INTERAKTIF</text>

<!-- title -->
<text x="62" y="148" class="disp" font-size="58" fill="#EAF3F1">Atlas <tspan fill="#5FE3D0">Reproduksi</tspan></text>

<!-- subtitle -->
<text x="64" y="190" class="body" font-size="19" fill="#B9C9CB">Diagram anatomi, hormon, siklus, hingga kelahiran —</text>
<text x="64" y="216" class="body" font-size="19" fill="#B9C9CB">divisualisasikan lewat simulasi interaktif.</text>

<!-- readout row -->
<text x="64" y="282" class="disp" font-size="32" fill="#EAF3F1">02</text>
<text x="64" y="303" class="mono" font-size="11" letter-spacing="1.3" fill="#8B96A0">SISTEM ORGAN</text>

<line x1="234" y1="256" x2="234" y2="306" stroke="#232E3A" stroke-width="1"/>

<text x="264" y="282" class="disp" font-size="32" fill="#EAF3F1">09</text>
<text x="264" y="303" class="mono" font-size="11" letter-spacing="1.3" fill="#8B96A0">HORMON REPRODUKSI</text>

<line x1="474" y1="256" x2="474" y2="306" stroke="#232E3A" stroke-width="1"/>

<text x="504" y="282" class="disp" font-size="32" fill="#EAF3F1">18</text>
<text x="504" y="303" class="mono" font-size="11" letter-spacing="1.3" fill="#8B96A0">SOAL EVALUASI</text>

<!-- cycle wheel -->
<g>
  <circle cx="980" cy="165" r="90" fill="none" stroke="#E8534A" stroke-width="20" stroke-dasharray="100.98 464.51" stroke-dashoffset="0" transform="rotate(-90 980 165)"/>
  <circle cx="980" cy="165" r="90" fill="none" stroke="#5B96D6" stroke-width="20" stroke-dasharray="161.57 403.92" stroke-dashoffset="-100.98" transform="rotate(-90 980 165)"/>
  <circle cx="980" cy="165" r="90" fill="none" stroke="#D9A441" stroke-width="20" stroke-dasharray="20.20 545.29" stroke-dashoffset="-262.55" transform="rotate(-90 980 165)"/>
  <circle cx="980" cy="165" r="90" fill="none" stroke="#4ADE93" stroke-width="20" stroke-dasharray="282.74 282.74" stroke-dashoffset="-282.74" transform="rotate(-90 980 165)"/>

  <line x1="996.5" y1="92.9" x2="1003.6" y2="61.7" stroke="#B9C9CB" stroke-width="2"/>
  <line x1="1054.0" y1="165.0" x2="1086.0" y2="165.0" stroke="#B9C9CB" stroke-width="2"/>
  <line x1="980.0" y1="239.0" x2="980.0" y2="271.0" stroke="#B9C9CB" stroke-width="2"/>
  <line x1="906.0" y1="165.0" x2="874.0" y2="165.0" stroke="#B9C9CB" stroke-width="2"/>
  <line x1="980.0" y1="91.0" x2="980.0" y2="59.0" stroke="#B9C9CB" stroke-width="2"/>

  <text x="1008.5" y="44.2" class="mono" font-size="12" fill="#8B96A0" text-anchor="middle">01</text>
  <text x="1112.0" y="169.5" class="mono" font-size="12" fill="#8B96A0" text-anchor="start">07</text>
  <text x="980.0" y="297.0" class="mono" font-size="12" fill="#8B96A0" text-anchor="middle">14</text>
  <text x="848.0" y="169.5" class="mono" font-size="12" fill="#8B96A0" text-anchor="end">21</text>
  <text x="980.0" y="33.0" class="mono" font-size="12" fill="#8B96A0" text-anchor="middle">28</text>

  <text x="980" y="157" class="mono" font-size="11" letter-spacing="2" fill="#8B96A0" text-anchor="middle">SIKLUS</text>
  <text x="980" y="183" class="disp" font-size="24" fill="#EAF3F1" text-anchor="middle">28 HARI</text>
</g>

<!-- legend -->
<g class="mono" font-size="12" fill="#B9C9CB">
  <circle cx="808" cy="329" r="4" fill="#E8534A"/>
  <text x="820" y="333">Menstruasi</text>

  <circle cx="916" cy="329" r="4" fill="#5B96D6"/>
  <text x="928" y="333">Folikuler</text>

  <circle cx="1017" cy="329" r="4" fill="#D9A441"/>
  <text x="1029" y="333">Ovulasi</text>

  <circle cx="1104" cy="329" r="4" fill="#4ADE93"/>
  <text x="1116" y="333">Luteal</text>
</g>
</svg>
